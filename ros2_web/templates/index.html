<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS 2 Kontrol Paneli & Terminal</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='xterm.css') }}" />
    <script src="{{ url_for('static', filename='xterm.js') }}"></script>
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
        }
        
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        h2 { color: #444; margin-top: 0; }

        /* Yan Yana Yerleşim (Flexbox) Ayarları */
        .ana-konteyner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sol Panel (Terminal) */
        .sol-panel {
            flex: 2;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Sağ Panel (Butonlar) */
        .sag-panel {
            flex: 1;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: left;
        }

        /* Terminal Kutusu Tasarımı (Ortak Class) */
        .terminal-kutu {
            width: 100%;
            height: 500px; /* Ekrana daha rahat sığması için 300px tutuldu */
            border: 2px solid #333;
            padding: 10px;
            background-color: #000;
            border-radius: 8px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Buton Tasarımı */
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            width: 100%;
            margin-bottom: 15px; 
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        
        #sonuc { font-weight: bold; margin-top: 15px; min-height: 20px;}

        /* Kontroller (butonlar) */
        .controls {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.02);
        }

        /* Kamera Kutusu Tasarımı */
        #kamera-container {
            width: 100%;
            background-color: #222;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            text-align: center;
            height: 100%;
            min-height: 320px;
        }

        #kamera-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .kamera-baslik {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>ROS 2 Interface</h1>

    <div class="ana-konteyner">
        
        <div class="sol-panel">
            <h2>💻 Ubuntu Terminal 1</h2>
            <div id="terminal-container-1" class="terminal-kutu"></div>
            
            <h2>💻 Ubuntu Terminal 2</h2>
            <div id="terminal-container-2" class="terminal-kutu"></div>
        </div>

        <div class="sag-panel">
            <h2>📷 Canlı Kamera Akışı (RTSP)</h2>
            
            <div id="kamera-container" style="width: 100%; background-color: #000; border-radius: 8px; margin-bottom: 20px; overflow: hidden; position: relative;">
                <div style="position: absolute; top: 10px; left: 10px; background-color: rgba(0,0,0,0.7); color: #00ff00; padding: 5px 10px; border-radius: 4px; font-weight: bold; z-index: 10;">
                    🔴 REC | RTSP Yayını
                </div>
                
                <img src="/kamera-yayini" style="width: 100%; max-height: 480px; display: block; object-fit: cover;" alt="RTSP Bağlantısı Bekleniyor...">
            </div>
            
            <div class="controls" style="margin-top:15px;">
                <h2>⚙️ Control Panel</h2>
                <br>
                <button class="btn" onclick="arkaplanKumandaKodu()" style="background-color: #28a745;">
                    ⚙️ Kumanda Kodu Arkaplan (Terminal 1)
                </button>

                <button class="btn" onclick="jetsonKodu()" style="background-color: #1d7c32; font-weight: bold; border: 2px solid darkred;">
                    ⚙️ Jetson kodu (Terminal 2)
                </button>

                <button class="btn" onclick="acilStop()" style="background-color: #dc3545; font-weight: bold; border: 2px solid darkred;">
                    🛑 Arkaplani durdur (Terminal 1)
                </button>

                <button class="btn" onclick="sshKameraBaslat()" style="background-color: #007bff; font-weight: bold; border: 2px solid #0056b3;">
                📷 Kamerayı Başlat (Önce Terminal 2'den Jetson'a Bağlanilmali)
                </button>

                <p id="sonuc"></p>
            </div>
        </div>

    </div>

    <script>
    // --- KONTROL PANELİ İŞLEMLERİ ---

    //sabit kumanda kodu
    function arkaplanKumandaKodu() {
        fetch('/sabit-komut', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            document.getElementById('sonuc').innerText = data.mesaj;
            document.getElementById('sonuc').style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            console.error("Hata oluştu:", error);
        });
    }

    // Jetson kodu
    function jetsonKodu() {
        fetch('/jetson-kodu', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            document.getElementById('sonuc').innerText = data.mesaj;
            document.getElementById('sonuc').style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            console.error("Hata oluştu:", error);
        });
    }

    // ACİL STOP
    function acilStop() {
        const sonucAlani = document.getElementById('sonuc');
        sonucAlani.innerText = "Terminating processes...";
        sonucAlani.style.color = "red";

        fetch('/acil-stop', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            sonucAlani.innerText = data.mesaj;
            sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            sonucAlani.innerText = "Error occurred while stopping.";
            sonucAlani.style.color = "red";
        });
    }

    // --- TERMINAL 1 ---
    const term1 = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000' }
    });
    term1.open(document.getElementById('terminal-container-1'));

    // --- TERMINAL 2 ---
    const term2 = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000' }
    });
    term2.open(document.getElementById('terminal-container-2'));


    // Socket Bağlantısı
    const socket = io.connect('http://' + document.domain + ':' + location.port);

    // Terminal 1 Olayları
    socket.on('terminal-cikti', function(data) {
        term1.write(data.output);
    });
    term1.onData(function(data) {
        socket.emit('terminal-girdi', {input: data});
    });

    // Terminal 2 Olayları 
    socket.on('terminal-cikti-2', function(data) {
        term2.write(data.output);
    });
    term2.onData(function(data) {
        socket.emit('terminal-girdi-2', {input: data});
    });

    // Arayüzdeki terminalden kamerayı arka planda başlatır
    function sshKameraBaslat() {
        const onay = confirm("LÜTFEN DİKKAT!\nTerminal 2 üzerinden Jetson'a (SSH ile) bağlandığınızdan emin misiniz?");
        
        if (onay) {
            const sonucAlani = document.getElementById('sonuc');
            sonucAlani.innerText = "Kamera komutları Terminal 2'ye gönderiliyor...";
            sonucAlani.style.color = "black";

            fetch('/ssh-kamera-baslat', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                sonucAlani.innerText = data.mesaj;
                sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
            })
            .catch(error => {
                sonucAlani.innerText = "Hata oluştu!";
                sonucAlani.style.color = "red";
            });
        }
    }


    // Karşılama Mesajları
    term1.writeln('');
    term1.writeln('██╗  ██╗██╗   ██╗    ██████╗  ██████╗ ██╗   ██╗███████╗██████╗ ');
    term1.writeln('██║  ██║██║   ██║    ██╔══██╗██╔═══██╗██║   ██║██╔════╝██╔══██╗');
    term1.writeln('███████║██║   ██║    ██████╔╝██║   ██║██║   ██║█████╗  ██████╔╝');
    term1.writeln('██╔══██║██║   ██║    ██╔══██╗██║   ██║╚██╗ ██╔╝██╔══╝  ██╔══██╗');
    term1.writeln('██║  ██║╚██████╔╝    ██║  ██║╚██████╔╝ ╚████╔╝ ███████╗██║  ██║');
    term1.writeln('╚═╝  ╚═╝ ╚═════╝     ╚═╝  ╚═╝ ╚═════╝   ╚═══╝  ╚══════╝╚═╝  ╚═╝');
    term1.writeln('');
    term1.writeln('🚀 HU ROVER 2026 - TERMINAL 1 \n\r');
    term1.writeln('');

    term2.writeln('');
    term2.writeln('🚀 HU ROVER 2026 - TERMINAL 2 🚀');
    term2.writeln('İkinci işlem kanalı dinleniyor... \n\r');
    term2.writeln('');
    </script>

</body>
</html>
