<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS 2 Kontrol Paneli & Terminal</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='xterm.css') }}" />
    <script src="{{ url_for('static', filename='xterm.js') }}"></script>
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
        }
        
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        h2 { color: #444; margin-top: 0; }

        /* Yan Yana YerleŇüim (Flexbox) AyarlarńĪ */
        .ana-konteyner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sol Panel (Terminal) */
        .sol-panel {
            flex: 2;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Sańü Panel (Butonlar) */
        .sag-panel {
            flex: 1;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Terminal Kutusu TasarńĪmńĪ (Ortak Class) */
        .terminal-kutu {
            width: 100%;
            height: 500px; /* Ekrana daha rahat sńĪńümasńĪ i√ßin 300px tutuldu */
            border: 2px solid #333;
            padding: 10px;
            background-color: #000;
            border-radius: 8px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Buton TasarńĪmńĪ */
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            width: 100%;
            margin-bottom: 15px; 
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        
        #sonuc { font-weight: bold; margin-top: 15px; min-height: 20px;}
    </style>
</head>
<body>

    <h1>ROS 2 Interface</h1>

    <div class="ana-konteyner">
        
        <div class="sol-panel">
            <h2>ūüíĽ Ubuntu Terminal 1</h2>
            <div id="terminal-container-1" class="terminal-kutu"></div>
            
            <h2>ūüíĽ Ubuntu Terminal 2</h2>
            <div id="terminal-container-2" class="terminal-kutu"></div>
        </div>

        <div class="sag-panel">
            <h2>‚öôÔłŹ Control Panel</h2>
            <br>
            
            <button class="btn" onclick="arkaplanKumandaKodu()" style="background-color: #28a745;">
                ‚öôÔłŹ Kumanda Kodu Arkaplan (Terminal 1)
            </button>

            <button class="btn" onclick="jetsonKodu()" style="background-color: #1d7c32; font-weight: bold; border: 2px solid darkred;">
                ‚öôÔłŹ Jetson kodu (Terminal 2)
            </button>

            <button class="btn" onclick="acilStop()" style="background-color: #dc3545; font-weight: bold; border: 2px solid darkred;">
                ūüõĎ Arkaplani durdur (Terminal 1)
            </button>

            <p id="sonuc"></p>
        </div>

    </div>

    <script>
    // --- KONTROL PANELńį ńįŇěLEMLERńį ---

    //sabit kumanda kodu
    function arkaplanKumandaKodu() {
        fetch('/sabit-komut', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            document.getElementById('sonuc').innerText = data.mesaj;
            document.getElementById('sonuc').style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            console.error("Hata oluŇütu:", error);
        });
    }

    // Jetson kodu
    function jetsonKodu() {
        fetch('/jetson-kodu', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            document.getElementById('sonuc').innerText = data.mesaj;
            document.getElementById('sonuc').style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            console.error("Hata oluŇütu:", error);
        });
    }

    // ACńįL STOP
    function acilStop() {
        const sonucAlani = document.getElementById('sonuc');
        sonucAlani.innerText = "Terminating processes...";
        sonucAlani.style.color = "red";

        fetch('/acil-stop', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            sonucAlani.innerText = data.mesaj;
            sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            sonucAlani.innerText = "Error occurred while stopping.";
            sonucAlani.style.color = "red";
        });
    }

    // --- TERMINAL 1 ---
    const term1 = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000' }
    });
    term1.open(document.getElementById('terminal-container-1'));

    // --- TERMINAL 2 ---
    const term2 = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000' }
    });
    term2.open(document.getElementById('terminal-container-2'));


    // Socket BańülantńĪsńĪ
    const socket = io.connect('http://' + document.domain + ':' + location.port);

    // Terminal 1 OlaylarńĪ
    socket.on('terminal-cikti', function(data) {
        term1.write(data.output);
    });
    term1.onData(function(data) {
        socket.emit('terminal-girdi', {input: data});
    });

    // Terminal 2 OlaylarńĪ 
    socket.on('terminal-cikti-2', function(data) {
        term2.write(data.output);
    });
    term2.onData(function(data) {
        socket.emit('terminal-girdi-2', {input: data});
    });


    // KarŇüńĪlama MesajlarńĪ
    term1.writeln('');
    term1.writeln('‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ');
    term1.writeln('‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó');
    term1.writeln('‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ');
    term1.writeln('‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó');
    term1.writeln('‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ    ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ');
    term1.writeln('‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ   ‚ēö‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ');
    term1.writeln('');
    term1.writeln('ūüöÄ HU ROVER 2026 - TERMINAL 1 ūüöÄ');
    term1.writeln('');

    term2.writeln('');
    term2.writeln('ūüöÄ HU ROVER 2026 - TERMINAL 2 ūüöÄ');
    term2.writeln('ńįkinci iŇülem kanalńĪ dinleniyor...');
    term2.writeln('');
    </script>

</body>
</html>
