<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS 2 Kontrol Paneli & Terminal</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='xterm.css') }}" />
    <script src="{{ url_for('static', filename='xterm.js') }}"></script>
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
        }
        
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        h2 { color: #444; margin-top: 0; }

        /* Yan Yana Yerleşim (Flexbox) Ayarları */
        .ana-konteyner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sol Panel (Terminal) */
        .sol-panel {
            flex: 2;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Sağ Panel (Butonlar) */
        .sag-panel {
            flex: 1;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Terminal Kutusu Tasarımı */
        #terminal-container {
            width: 100%;
            height: 500px;
            border: 2px solid #333;
            padding: 10px;
            background-color: #000;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Buton Tasarımı */
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            width: 100%;
            margin-bottom: 15px; 
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #0056b3; }
        
        #sonuc { font-weight: bold; margin-top: 15px; min-height: 20px;}
    </style>
</head>
<body>

    <h1>ROS 2 Interface</h1>

    <div class="ana-konteyner">
        
        <div class="sol-panel">
            <h2>💻 Ubuntu Terminal</h2>
            <div id="terminal-container"></div>
        </div>

        <div class="sag-panel">
            <h2>⚙️ Control Panel</h2>
            
            <div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; text-align: left;">
                <label>File Path To Run:<br>
                <textarea id="pathInput" rows="2" style="width: 100%; margin-top: 5px;"></textarea>
                </label><br><br>
                
                <label>______________________________________<br><br>ON: Web Terminal / OFF: Local Terminal<br><br>
                <button type="button" id="toggleBtn" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">OFF</button>
                
                <button type="button" onclick="ayarlariKaydet()" style="padding: 10px 20px; font-weight: bold; cursor: pointer; margin-left: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px;">Save</button>
                
                <p id="ayarSonuc" style="font-size: 14px; margin-top: 10px; min-height: 20px;"></p>
            </div>

            <hr style="border: 1px solid #ddd; margin-bottom: 20px;">

            <button class="btn" onclick="scriptiBaslat()">Run Script</button>

            <button class="btn" onclick="sabitKoduBaslat()" style="background-color: #28a745;">
                ⚙️ Sabit Kodu Çalıştır
            </button>

            <button class="btn" onclick="acilStop()" style="background-color: #dc3545; font-weight: bold; border: 2px solid darkred;">
                🛑 EMERGENCY STOP
            </button>

            <p id="sonuc"></p>
        </div>

    </div>

    <script>
    // --- AYARLAR VE KONTROL PANELİ İŞLEMLERİ ---
    
    // Toggle
    let btn = document.getElementById("toggleBtn");
    let hiddenInput = document.getElementById("toggleValue");

    btn.onclick = function(){
        if(btn.innerText === "OFF"){
            btn.innerText = "ON";
            if(hiddenInput) hiddenInput.value = "ON";
        }else{
            btn.innerText = "OFF";
            if(hiddenInput) hiddenInput.value = "OFF";
        }
    }

    // YENİ: OK Butonuna basıldığında çalışacak fonksiyon
    function ayarlariKaydet() {
        const pathValue = document.getElementById('pathInput').value;
        const toggleValue = document.getElementById("toggleBtn").innerText;
        const sonucAlani = document.getElementById('sonuc');

        if (!pathValue.trim()) {
            sonucAlani.innerText = "Please enter a file path first!";
            sonucAlani.style.color = "red";
            return;
        }

        sonucAlani.innerText = "Settings are being saved...";
        sonucAlani.style.color = "black";

        fetch('/ayarlari-kaydet', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                path: pathValue,
                toggle: toggleValue
            })
        })
        .then(response => response.json())
        .then(data => {
            sonucAlani.innerText = data.mesaj;
            sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            sonucAlani.innerText = "Error occurred while saving settings.";
            sonucAlani.style.color = "red";
        });
    }

    //sabit kumanda kodu
    function sabitKoduBaslat() {
        // Backend'deki yeni rotamıza istek atıyoruz
        fetch('/sabit-komut', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            // İstersen bildirim mesajını sonuc id'li p etiketine de yazdırabilirsin
            document.getElementById('sonuc').innerText = data.mesaj;
            document.getElementById('sonuc').style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            console.error("Hata oluştu:", error);
        });
    }

    // ACİL STOP
function acilStop() {
    const sonucAlani = document.getElementById('sonuc');
    sonucAlani.innerText = "Terminating processes...";
    sonucAlani.style.color = "red";

    fetch('/acil-stop', { method: 'POST' })
    .then(response => response.json())
    .then(data => {
        sonucAlani.innerText = data.mesaj;
        sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
    })
    .catch(error => {
        sonucAlani.innerText = "Error occurred while stopping.";
        sonucAlani.style.color = "red";
    });
}

    // ÇALIŞTIR
    function scriptiBaslat() {
        const sonucAlani = document.getElementById('sonuc');
        sonucAlani.innerText = "Script is starting...";
        sonucAlani.style.color = "black";

        // tetikleme yapar
        fetch('/script-calistir', { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            sonucAlani.innerText = data.mesaj;
            sonucAlani.style.color = data.durum === "basarili" ? "green" : "red";
        })
        .catch(error => {
            sonucAlani.innerText = "Error occurred while starting the script.";
            sonucAlani.style.color = "red";
        });
    }

    // --- TERMINAL ---
    const term = new Terminal({
        cursorBlink: true,
        theme: { background: '#000000' }
    });
    term.open(document.getElementById('terminal-container'));

    const socket = io.connect('http://' + document.domain + ':' + location.port);

    socket.on('terminal-cikti', function(data) {
        term.write(data.output);
    });

    term.onData(function(data) {
        socket.emit('terminal-girdi', {input: data});
    });

    term.writeln('');
term.writeln('██╗  ██╗██╗   ██╗    ██████╗  ██████╗ ██╗   ██╗███████╗██████╗ ');
term.writeln('██║  ██║██║   ██║    ██╔══██╗██╔═══██╗██║   ██║██╔════╝██╔══██╗');
term.writeln('███████║██║   ██║    ██████╔╝██║   ██║██║   ██║█████╗  ██████╔╝');
term.writeln('██╔══██║██║   ██║    ██╔══██╗██║   ██║╚██╗ ██╔╝██╔══╝  ██╔══██╗');
term.writeln('██║  ██║╚██████╔╝    ██║  ██║╚██████╔╝ ╚████╔╝ ███████╗██║  ██║');
term.writeln('╚═╝  ╚═╝ ╚═════╝     ╚═╝  ╚═╝ ╚═════╝   ╚═══╝  ╚══════╝╚═╝  ╚═╝');
term.writeln('');
term.writeln('🚀 HU ROVER 2026 🚀');
term.writeln('');
</script>

</body>
</html>
